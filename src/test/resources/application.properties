spring.datasource.url=jdbc:h2:mem:arenahub_test;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
arenahub.jwt.secret=arena-hub-test-secret
arenahub.jwt.expire-seconds=86400
arenahub.cache.leaderboard-ttl-seconds=60
spring.data.redis.repositories.enabled=false
