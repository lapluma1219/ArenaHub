spring.application.name=arena-hub-server
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/arenahub;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false
arenahub.cache.leaderboard-ttl-seconds=60

arenahub.jwt.secret=arena-hub-demo-secret-change-before-production
arenahub.jwt.expire-seconds=86400
