services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  arena-hub:
    build: .
    depends_on:
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      ARENAHUB_JWT_SECRET: arena-hub-compose-secret-change-me
    volumes:
      - arena-hub-data:/app/data

volumes:
  arena-hub-data:
